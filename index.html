		@keyframes bounce {
			50% {
				transform: translatey(-20px);
			}

				transform: translatey(20px);
			}
		}

		.bounce div {
			border-radius: 100%;
			height: 10px;
			width: 10px;
			background-color: hsl(0, 0%, 100%);
			animation: bounce 1s ease-in-out infinite;
			position: absolute;
			top: 0;
			transform: translatey(20px);
		}

		.bounce div:first-of-type {
			left: -20px;
			animation-delay: 0.20s;
		}

		.bounce div:nth-of-type(2) {
			animation-delay: 0.10s;
		}

		.bounce div:last-of-type {
			left: 20px;
		}
	</style>

				<script>
					function game(id) {
						var frame = document.getElementById('frame')
						if (id == 1) { frame.src = './gfiles/2048/index.html' }
						if (id == 2) { frame.src = './gfiles/astray/index.html' }
						if (id == 3) { frame.src = './gfiles/breaklock/index.html' }
						if (id == 4) { frame.src = './gfiles/cookies/index.html' }
						if (id == 5) { frame.src = './gfiles/flappybird/index.html' }
						if (id == 6) { frame.src = './gfiles/hextris/index.html' }
						if (id == 7) { frame.src = './gfiles/pacman/index.htm' }
						if (id == 8) { frame.src = './gfiles/radius-raid/index.html' }
						if (id == 9) { frame.src = './gfiles/spaceinvaders/index.html' }
						if (id == 10) { frame.src = './gfiles/towermaster/index.html' }
						if (id == 11) { frame.src = './gfiles/tetris/index.html' }
						showbutton()
					}

					function stopgame() {
						document.getElementById('frame').src = './errors/paused.html';
						hidebutton()
					}
				</script>
				<section>
						<div id="ho" style="width: 100%;"><iframe id="frame" style="width: 100%;height: 100vh;" src="./errors/nogameid.html"></iframe></div>
					<script>
						function showbutton() {
							document.getElementById('fullscreenclickbtn').style.opacity = '1';
						}
		
						function hidebutton() {
							document.getElementById('fullscreenclickbtn').style.opacity = '0';
						}
		
						function fullscreen() {
							var elem = document.getElementById('frame');
							if (elem.requestFullscreen) {
								elem.requestFullscreen();
							} else if (elem.webkitRequestFullscreen) { /* Safari */
								elem.webkitRequestFullscreen();
							} else if (elem.msRequestFullscreen) { /* IE11 */
								elem.msRequestFullscreen();
							}
						}
					</script>
					<button onclick="document.getElementById('frame').contentWindow.location.reload();"><i class="fa-solid fa-rotate-right" style="color: white;"></i></button>
					<button id="fullscreenclickbtn" onclick="fullscreen()"><i
